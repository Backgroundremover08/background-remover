<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RiZo KiNg 👑 | Secure Terminal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #0f0;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            height: 100vh;
            font-size: 16px;
            line-height: 1.4;
        }

        #terminal {
            padding: 20px;
            height: 100vh;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .cursor {
            display: inline-block;
            width: 12px;
            height: 18px;
            background: #0f0;
            animation: blink 0.8s infinite;
            vertical-align: middle;
            margin-left: 2px;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #000;
            border: 4px solid #0f0;
            padding: 50px;
            text-align: center;
            font-size: 2.5rem;
            font-weight: bold;
            display: none;
            z-index: 1000;
            box-shadow: 0 0 50px #0f0;
            animation: glitch 0.3s infinite;
        }

        .denied {
            border-color: #f00;
            color: #f00;
            box-shadow: 0 0 50px #f00;
        }

        .granted {
            color: #0f0;
        }

        @keyframes glitch {
            0% { transform: translate(-50%, -50%) translate(0) }
            20% { transform: translate(-50%, -50%) translate(-3px, 3px) }
            40% { transform: translate(-50%, -50%) translate(-3px, -3px) }
            60% { transform: translate(-50%, -50%) translate(3px, 3px) }
            80% { transform: translate(-50%, -50%) translate(3px, -3px) }
            100% { transform: translate(-50%, -50%) translate(0) }
        }

        .watermark {
            position: fixed;
            top: 20px;
            right: 20px;
            font-size: 1.5rem;
            color: #0f0;
            opacity: 0.8;
            z-index: 100;
            text-shadow: 0 0 10px #0f0;
            pointer-events: none;
        }

        .start-msg {
            color: #0f0;
            margin-bottom: 10px;
            opacity: 0.8;
        }

        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #000;
        }

        ::-webkit-scrollbar-thumb {
            background: #0f0;
        }
    </style>
</head>
<body>

    <div class="popup granted" id="granted">

        var output = document.getElementById('output');
        var altCount = 0;
        var shiftCount = 0;
        var lastAltTime = 0;
        var lastShiftTime = 0;

        document.addEventListener('keydown', function(e) {
            // Prevent default scrolling with space/arrows
            if(e.key !== 'F5' && e.key !== 'F12') {
                e.preventDefault();
            }

            // Handle Alt key (3 times = Access Granted)
            if(e.key === 'Alt') {
                var now = Date.now();
                if(now - lastAltTime < 1000) {
                    altCount++;
                } else {
                    altCount = 1;
                }
                lastAltTime = now;
                
                if(altCount >= 3) {
                    showPopup('granted');
                    altCount = 0;
                }
                return;
            }

            // Handle Shift key (3 times = Access Denied)
            if(e.key === 'Shift') {
                var now = Date.now();
                if(now - lastShiftTime < 1000) {
                    shiftCount++;
                } else {
                    shiftCount = 1;
                }
                lastShiftTime = now;
                
                if(shiftCount >= 3) {
                    showPopup('denied');
                    shiftCount = 0;
                }
                return;
            }

            // Handle Escape to close popups
            if(e.key === 'Escape') {
                document.getElementById('granted').style.display = 'none';
                document.getElementById('denied').style.display = 'none';
                return;
            }

            // Add random code snippet
            var randomIndex = Math.floor(Math.random() * codeSnippets.length);
            var randomCode = codeSnippets[randomIndex];
            var timestamp = new Date().toLocaleTimeString();
            
            output.innerHTML += '[' + timestamp + '] ' + randomCode + '\n';
            
            // Auto scroll to bottom
            window.scrollTo(0, document.body.scrollHeight);
        });

        function showPopup(id) {
            var popup = document.getElementById(id);
            popup.style.display = 'block';
            
            // Hide after 2 seconds
            setTimeout(function() {
                popup.style.display = 'none';
            }, 2000);
        }

        // Prevent right click context menu
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });

        // Focus body on load
        window.onload = function() {
            document.body.focus();
        };
    </script>
